name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

{% if values.registry == 'ecr' %}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ '{{' }} secrets.AWS_ROLE_ARN {{ '}}' }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push to ECR
        run: |
          docker build -t ${{ '{{' }} steps.ecr.outputs.registry {{ '}}' }}/${{ values.imageName }}:${{ '{{' }} github.sha {{ '}}' }} .
          docker push ${{ '{{' }} steps.ecr.outputs.registry {{ '}}' }}/${{ values.imageName }}:${{ '{{' }} github.sha {{ '}}' }}
{% elif values.registry == 'dockerhub' %}
      - uses: docker/login-action@v3
        with:
          username: ${{ '{{' }} secrets.DOCKER_USERNAME {{ '}}' }}
          password: ${{ '{{' }} secrets.DOCKER_TOKEN {{ '}}' }}

      - name: Build and push to Docker Hub
        run: |
          docker build -t ${{ '{{' }} secrets.DOCKER_USERNAME {{ '}}' }}/${{ values.imageName }}:${{ '{{' }} github.sha {{ '}}' }} .
          docker push ${{ '{{' }} secrets.DOCKER_USERNAME {{ '}}' }}/${{ values.imageName }}:${{ '{{' }} github.sha {{ '}}' }}
{% endif %}

      - uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ '{{' }} secrets.KUBECONFIG {{ '}}' }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
