apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: lambda
  title: Deploy AWS Lambda
  description: Scaffold a serverless function with CI/CD pipeline to deploy on AWS Lambda
  tags:
    - aws
    - lambda
    - serverless
    - function
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Lambda Details
      required:
        - functionName
        - runtime
        - githubOrg
      properties:
        githubOrg:
          title: GitHub Organization
          type: string
          description: GitHub organization or user where the repo will be created
          default: replace-with-your-github-org
          ui:help: "Example: my-company, henriquesgnc"
        functionName:
          title: Function Name
          type: string
          description: Name of the Lambda function
          pattern: "^[a-zA-Z0-9-]+$"
          ui:autofocus: true
          ui:help: "Example: process-orders, slack-notifier"
        description:
          title: Description
          type: string
          default: "Lambda function created with Backstage"
        runtime:
          title: Runtime
          type: string
          default: node20
          enum:
            - node20
            - python312
          enumNames:
            - Node.js 20.x
            - Python 3.12
        memory:
          title: Memory (MB)
          type: integer
          default: 128
          enum: [128, 256, 512, 1024, 2048]
        timeout:
          title: Timeout (seconds)
          type: integer
          default: 30
          minimum: 1
          maximum: 900

  steps:
    - id: fetch
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          functionName: ${{ parameters.functionName }}
          description: ${{ parameters.description }}
          runtime: ${{ parameters.runtime }}
          memory: ${{ parameters.memory }}
          timeout: ${{ parameters.timeout }}
          githubOrg: ${{ parameters.githubOrg }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: github.com?repo=${{ parameters.functionName }}&owner=${{ parameters.githubOrg }}
        defaultBranch: main
        allowedHosts: ["github.com"]

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: catalog-info.yaml

  output:
    links:
      - title: Open Repository
        url: ${{ steps.publish.output.remoteUrl }}
        icon: github
