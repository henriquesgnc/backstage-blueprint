apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: docker-build
  title: Build & Push Docker Image
  description: Scaffold an application with Dockerfile and CI/CD pipeline to build and push images
  tags:
    - docker
    - ecr
    - dockerhub
    - build
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Image Details
      required:
        - appName
        - registry
        - githubOrg
      properties:
        githubOrg:
          title: GitHub Organization
          type: string
          description: GitHub organization or user where the repo will be created
          default: replace-with-your-github-org
          ui:help: "Example: my-company, henriquesgnc"
        appName:
          title: Application Name
          type: string
          description: Name used for the repository and Docker image
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
          ui:help: "Lowercase, no spaces. Example: my-api"
        description:
          title: Description
          type: string
          default: "Dockerized application created with Backstage"
        port:
          title: Container Port
          type: integer
          default: 3000
        registry:
          title: Container Registry
          type: string
          default: ecr
          enum:
            - ecr
            - dockerhub
          enumNames:
            - AWS ECR
            - Docker Hub

  steps:
    - id: fetch
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          appName: ${{ parameters.appName }}
          description: ${{ parameters.description }}
          port: ${{ parameters.port }}
          registry: ${{ parameters.registry }}
          githubOrg: ${{ parameters.githubOrg }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: github.com?repo=${{ parameters.appName }}&owner=${{ parameters.githubOrg }}
        defaultBranch: main
        allowedHosts: ["github.com"]

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: catalog-info.yaml

  output:
    links:
      - title: Open Repository
        url: ${{ steps.publish.output.remoteUrl }}
        icon: github
