apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.appName }}
  description: ${{ values.description }}
  annotations:
    github.com/project-slug: ${{ values.githubOrg }}/${{ values.appName }}
  tags:
    - docker
    - container
spec:
  type: service
  lifecycle: production
  owner: user:guest
