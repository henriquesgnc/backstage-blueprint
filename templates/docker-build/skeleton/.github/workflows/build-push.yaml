name: Build & Push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

{% if values.registry == 'ecr' %}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ '{{' }} secrets.AWS_ROLE_ARN {{ '}}' }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push to ECR
        run: |
          docker build -t ${{ '{{' }} steps.ecr.outputs.registry {{ '}}' }}/${{ values.appName }}:${{ '{{' }} github.sha {{ '}}' }} .
          docker push ${{ '{{' }} steps.ecr.outputs.registry {{ '}}' }}/${{ values.appName }}:${{ '{{' }} github.sha {{ '}}' }}
          docker tag ${{ '{{' }} steps.ecr.outputs.registry {{ '}}' }}/${{ values.appName }}:${{ '{{' }} github.sha {{ '}}' }} ${{ '{{' }} steps.ecr.outputs.registry {{ '}}' }}/${{ values.appName }}:latest
          docker push ${{ '{{' }} steps.ecr.outputs.registry {{ '}}' }}/${{ values.appName }}:latest
{% elif values.registry == 'dockerhub' %}
      - uses: docker/login-action@v3
        with:
          username: ${{ '{{' }} secrets.DOCKER_USERNAME {{ '}}' }}
          password: ${{ '{{' }} secrets.DOCKER_TOKEN {{ '}}' }}

      - name: Build and push to Docker Hub
        run: |
          docker build -t ${{ '{{' }} secrets.DOCKER_USERNAME {{ '}}' }}/${{ values.appName }}:${{ '{{' }} github.sha {{ '}}' }} .
          docker push ${{ '{{' }} secrets.DOCKER_USERNAME {{ '}}' }}/${{ values.appName }}:${{ '{{' }} github.sha {{ '}}' }}
          docker tag ${{ '{{' }} secrets.DOCKER_USERNAME {{ '}}' }}/${{ values.appName }}:${{ '{{' }} github.sha {{ '}}' }} ${{ '{{' }} secrets.DOCKER_USERNAME {{ '}}' }}/${{ values.appName }}:latest
          docker push ${{ '{{' }} secrets.DOCKER_USERNAME {{ '}}' }}/${{ values.appName }}:latest
{% endif %}
