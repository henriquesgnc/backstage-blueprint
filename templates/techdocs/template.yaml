apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: techdocs
  title: Documentation Site
  description: Scaffold a TechDocs documentation site with MkDocs
  tags:
    - docs
    - documentation
    - techdocs
    - mkdocs
spec:
  owner: user:guest
  type: website

  parameters:
    - title: Documentation Details
      required:
        - docName
        - githubOrg
      properties:
        githubOrg:
          title: GitHub Organization
          type: string
          description: GitHub organization or user where the repo will be created
          default: replace-with-your-github-org
          ui:help: "Example: my-company, henriquesgnc"
        docName:
          title: Site Name
          type: string
          description: Name of the documentation site
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
          ui:help: "Example: platform-docs, api-guide"
        description:
          title: Description
          type: string
          default: "Technical documentation created with Backstage"

  steps:
    - id: fetch
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          docName: ${{ parameters.docName }}
          description: ${{ parameters.description }}
          githubOrg: ${{ parameters.githubOrg }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: github.com?repo=${{ parameters.docName }}&owner=${{ parameters.githubOrg }}
        defaultBranch: main
        allowedHosts: ["github.com"]

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: catalog-info.yaml

  output:
    links:
      - title: Open Repository
        url: ${{ steps.publish.output.remoteUrl }}
        icon: github
