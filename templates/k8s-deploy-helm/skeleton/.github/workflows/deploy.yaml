name: Build & Deploy (Helm)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ '{{' }} steps.meta.outputs.tags {{ '}}' }}
    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
{% if values.registry == 'ecr' %}
            ${{ '{{' }} steps.ecr.outputs.registry {{ '}}' }}/${{ values.appName }}
{% elif values.registry == 'dockerhub' %}
            ${{ '{{' }} secrets.DOCKER_USERNAME {{ '}}' }}/${{ values.appName }}
{% endif %}
          tags: type=sha,type=ref,event=branch

{% if values.registry == 'ecr' %}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ '{{' }} secrets.AWS_ROLE_ARN {{ '}}' }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ '{{' }} steps.meta.outputs.tags {{ '}}' }}
{% elif values.registry == 'dockerhub' %}
      - uses: docker/login-action@v3
        with:
          username: ${{ '{{' }} secrets.DOCKER_USERNAME {{ '}}' }}
          password: ${{ '{{' }} secrets.DOCKER_TOKEN {{ '}}' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ '{{' }} steps.meta.outputs.tags {{ '}}' }}
{% endif %}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ '{{' }} secrets.KUBECONFIG {{ '}}' }}" | base64 -d > $HOME/.kube/config

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ values.appName }} . \
            --set image.tag=${{ '{{' }} needs.build-and-push.outputs.image-tag {{ '}}' }}
