apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: k8s-deploy-helm
  title: Deploy to Kubernetes (Helm)
  description: Scaffold an application with a Helm chart and CI/CD pipeline
  tags:
    - kubernetes
    - k8s
    - helm
    - deploy
    - docker
spec:
  owner: user:guest
  type: service

  parameters:
    - title: Application Details
      required:
        - appName
        - githubOrg
      properties:
        githubOrg:
          title: GitHub Organization
          type: string
          description: GitHub organization or user where the repo will be created
          default: replace-with-your-github-org
          ui:help: "Example: my-company, henriquesgnc"
        appName:
          title: Application Name
          type: string
          description: Name of the application (chart name, repo name, and K8s resources)
          pattern: "^[a-z0-9-]+$"
          ui:autofocus: true
        port:
          title: Container Port
          type: integer
          default: 3000
        replicas:
          title: Replicas
          type: integer
          default: 2
          minimum: 1
          maximum: 10
        registry:
          title: Container Registry
          type: string
          default: ecr
          enum:
            - ecr
            - dockerhub
          enumNames:
            - AWS ECR
            - Docker Hub

  steps:
    - id: fetch
      name: Fetch Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          appName: ${{ parameters.appName }}
          port: ${{ parameters.port }}
          replicas: ${{ parameters.replicas }}
          registry: ${{ parameters.registry }}
          githubOrg: ${{ parameters.githubOrg }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        repoUrl: github.com?repo=${{ parameters.appName }}&owner=${{ parameters.githubOrg }}
        defaultBranch: main
        allowedHosts: ["github.com"]

    - id: register
      name: Register in Catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: catalog-info.yaml

  output:
    links:
      - title: Open Repository
        url: ${{ steps.publish.output.remoteUrl }}
        icon: github
